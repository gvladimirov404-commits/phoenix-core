name: Release Signing

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  sign-release:
    name: Sign Release Artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build package
        run: |
          pip install build
          python -m build

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > ../checksums.txt
          cd ..

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.8.2

      - name: Sign checksums with Cosign (keyless)
        run: |
          cosign sign-blob --yes             --output-certificate checksums.txt.pem             --output-signature checksums.txt.sig             checksums.txt

      - name: Sign Docker image
        run: |
          # Build and push image
          docker build -t ghcr.io/${{ github.repository }}:${{ github.ref_name }} .
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push ghcr.io/${{ github.repository }}:${{ github.ref_name }}

          # Sign image
          cosign sign --yes             ghcr.io/${{ github.repository }}:${{ github.ref_name }}

      - name: Upload signatures to release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            checksums.txt
            checksums.txt.pem
            checksums.txt.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
