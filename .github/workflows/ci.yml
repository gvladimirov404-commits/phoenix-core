name: Phoenix Core CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  # ──────────────────────────────────────────
  # 1. Code Quality & Security Scanning
  # ──────────────────────────────────────────
  security-scan:
    runs-on: ubuntu-latest
    name: Security Scanning
    steps:
      - uses: actions/checkout@v4

      # ── Bandit (Python Security Linter) ──
      - name: Run Bandit
        uses: PyCQA/bandit@main
        with:
          args: "-r phoenix_core -f json -o bandit-report.json || true"

      - name: Upload Bandit Report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

      # ── Semgrep (Pattern Analysis) ──
      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/owasp-top-ten
            p/cwe-top-25
            p/python
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      # ── TruffleHog (Secret Scanning) ──
      - name: Secret Scanning
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD
          extra_args: --debug --only-verified

  # ──────────────────────────────────────────
  # 2. CodeQL Analysis (Deep Semantic)
  # ──────────────────────────────────────────
  codeql:
    runs-on: ubuntu-latest
    name: CodeQL Analysis
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-extended,security-and-quality
          config: |
            paths:
              - phoenix_core
            paths-ignore:
              - tests
              - docs

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # ──────────────────────────────────────────
  # 3. Dependency Scanning
  # ──────────────────────────────────────────
  dependency-review:
    runs-on: ubuntu-latest
    name: Dependency Review
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0
          comment-summary-in-pr: true

  # ──────────────────────────────────────────
  # 4. Safety & pip-audit
  # ──────────────────────────────────────────
  dependency-audit:
    runs-on: ubuntu-latest
    name: Dependency Audit
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install safety pip-audit

      - name: Run Safety
        run: safety check -r requirements.txt --json --output safety-report.json || true

      - name: Run pip-audit
        run: pip-audit --desc --format=json --output=pip-audit-report.json -r requirements.txt || true

      - name: Upload Audit Reports
        uses: actions/upload-artifact@v4
        with:
          name: dependency-audit-reports
          path: |
            safety-report.json
            pip-audit-report.json

  # ──────────────────────────────────────────
  # 5. Container Security Scan
  # ──────────────────────────────────────────
  container-scan:
    runs-on: ubuntu-latest
    name: Container Security
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build --target production -t phoenix-core:test .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: phoenix-core:test
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Run Dockle CIS check
        uses: goodwithtech/dockle-action@main
        with:
          image: phoenix-core:test
          format: json
          output: dockle-report.json
        continue-on-error: true

  # ──────────────────────────────────────────
  # 6. Tests
  # ──────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    name: Tests
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint with flake8
        run: |
          flake8 phoenix_core --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 phoenix_core --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics

      - name: Type check with mypy
        run: mypy phoenix_core --ignore-missing-imports

      - name: Format check with black
        run: black --check phoenix_core tests

      - name: Run tests with pytest
        run: pytest --cov=phoenix_core --cov-report=xml --cov-report=term

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ──────────────────────────────────────────
  # 7. SBOM Generation
  # ──────────────────────────────────────────
  sbom:
    runs-on: ubuntu-latest
    name: SBOM Generation
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json
